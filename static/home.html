<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css">
    <title>FastAPI - Saluto</title>
</head>
<body>
    <h1>Esercitazione Web Server</h1>
    
    <div class="card">
        <p id="orario">Clicca per l'ora</p>
        <button id="btn-ora">Controlla Ora</button>
    </div>

    <hr>

    <div class="card">
        <h3>Saluto Personalizzato</h3>
        <input type="text" id="input-nome" placeholder="Scrivi il tuo nome...">
        <button id="btn-saluto">Invia al Server</button>
        <h2 id="risposta-saluto"></h2>
    </div>
<div class="card">
    <h3>Calcola Somma</h3>
    <input type="number" id="num1" placeholder="Primo numero">
    <input type="number" id="num2" placeholder="Secondo numero">
    <button id="btn-calcolasomma">Calcola</button>
    <h2 id="risultato-somma"></h2>
</div>
    <div class="card">
    <h3>Calcolatrice</h3>
    
    <input type="number" id="num1" placeholder="Primo numero">
    
    <select id="operazione">
        <option value="add">+</option>
        <option value="sub">-</option>
        <option value="mul">*</option>
        <option value="div">/</option>
    </select>
    
    <input type="number" id="num2" placeholder="Secondo numero">
    
    <button id="btn-calcola">Calcola</button>
    
    <h2 id="risultato"></h2>
</div>
    <script src="/static/script.js"></script>
</body>
</html>
